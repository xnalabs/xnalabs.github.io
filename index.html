<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="XNA Labs — your partner in precision medicine. Cloud biolab and clinical platform.">
  <title>XNA Labs — Precision Medicine</title>

  <link rel="icon" type="image/svg+xml" href="img/logo.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Azeret+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/site.css">
</head>

<body>
  <section class="hero">
    <div class="brand-bar">
      <img src="./img/logo.svg" alt="XNA Labs">
      <span class="brand-meta">Precision Medicine</span>
    </div>

    <div class="hero-content">
      <h1>Your partner in <span class="accent-serif">Precision Medicine</span></h1>

      <div class="hero-actions">
        <a href="https://xnacloud.com" class="cta">
          <span class="cta-circle" style="background: linear-gradient(90deg, #00D4FF99 0%, #A87CFF99 100%);"></span>
          <span class="cta-text cta-text--mono">Explore the Lab</span>
        </a>
        <a href="https://drxna.com" class="cta">
          <span class="cta-circle" style="background: linear-gradient(90deg, #FF3D0099 0%, #FF812099 50%, #00D4FF99 100%);"></span>
          <span class="cta-text cta-text--sans">Empowering Clinics</span>
        </a>
      </div>
    </div>

    <span class="brand-foot">Precision Medicine</span>
  </section>
</body>
</html>
